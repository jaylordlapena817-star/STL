<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Bet</title>

    <link rel="stylesheet" href="css/bet.css">
</head>
<body>

<div class="container">

    <h1>🎯 Place Demo Bet</h1>

    <div class="card">

        <label>Number 1</label>
        <select id="num1"></select>

        <label>Number 2</label>
        <select id="num2"></select>

        <label>Draw</label>
        <select id="draw">
            <option value="morning">Morning (11:00 AM)</option>
            <option value="afternoon">Afternoon (4:00 PM)</option>
            <option value="evening">Evening (8:00 PM)</option>
        </select>

        <label>Credits</label>
        <input type="number" id="amount" placeholder="Enter credits">

        <p id="status">Checking betting status...</p>

        <button id="betBtn">Submit Bet</button>

    </div>

</div>

<script type="module" src="js/bet.js"></script>

</body>
</html>
