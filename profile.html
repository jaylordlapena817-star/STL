<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>

    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/navigation.css">
</head>
<body>

<div class="container">

    <div class="profile-card">

        <div class="avatar">
            👤
        </div>

        <h2 id="username">Loading...</h2>

        <p id="email">Loading...</p>

        <div class="info">

            <div class="item">
                <span>UID</span>
                <p id="uid">Loading...</p>
            </div>

            <div class="item">
                <span>Credits</span>
                <p id="credits">0</p>
            </div>

            <div class="item">
                <span>Role</span>
                <p id="role">User</p>
            </div>

        </div>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<script type="module" src="js/profile.js"></script>
<script src="js/navigation.js"></script>

</body>
</html>
