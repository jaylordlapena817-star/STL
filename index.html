<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Demo</title>

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/navigation.css">
</head>
<body>

<header>

    <h1>🎯 STL Demo</h1>

    <p>Virtual Credits Only</p>

</header>

<section class="result-card">

    <h2>Latest Result</h2>

    <div class="balls">

        <div class="ball" id="num1">--</div>

        <div class="ball" id="num2">--</div>

    </div>

    <span id="drawName">
        Waiting for Result
    </span>

</section>

<section class="countdown-card">

    <h2>Next Draw</h2>

    <h1 id="countdown">
        00:00:00
    </h1>

    <p id="cutoff">
        Loading...
    </p>

</section>

<section class="buttons" id="buttons">

    <a href="login.html">
        <button type="button">Login</button>
    </a>

    <a href="register.html">
        <button type="button">Register</button>
    </a>

</section>

<script type="module" src="js/index.js"></script>

<!-- Navigation (optional para sa landing page) -->
<script src="js/navigation.js"></script>

</body>
</html>
